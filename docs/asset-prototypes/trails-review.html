<!DOCTYPE html>
<!--
  Trail REVIEW harness — loads the REAL client/scripts/trailEffects.js (the exact shipping
  renderers via TRAIL_FX), so what you see here is what ships. Cycle every trail with ◄ ►,
  tune the global knobs, and "Save config" to dump the settings as JSON.
  OPEN THIS FILE DIRECTLY in a browser (file://) — it references ../../client/scripts/trailEffects.js
  relative to itself. Per-effect internal params (e.g. bubbles' rise/size) are baked in
  trailEffects.js; tell the main session which to change and it'll bake them.
-->
<html>
<head>
<meta charset="utf-8">
<title>chaochao — trail review</title>
<style>
  body { margin:0; background:#0c0e14; color:#cdd3df; font:13px/1.4 system-ui, sans-serif; }
  #wrap { display:flex; height:100vh; }
  #stage { flex:1; position:relative; }
  canvas { display:block; width:100%; height:100%; background:
      radial-gradient(120% 120% at 50% 40%, #161a24 0%, #0a0c11 100%); }
  #panel { width:300px; padding:16px 18px; background:#11141c; border-left:1px solid #222936; overflow:auto; }
  h1 { font-size:15px; margin:0 0 4px; color:#fff; }
  .sub { color:#7f8aa0; font-size:11px; margin-bottom:14px; }
  .row { margin:12px 0; }
  .row label { display:block; font-weight:600; color:#aeb7c8; margin-bottom:5px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .eff { display:flex; align-items:center; gap:8px; }
  .eff button { width:34px; height:34px; font-size:18px; background:#1c2230; color:#cdd3df; border:1px solid #2c3446; border-radius:7px; cursor:pointer; }
  .eff button:hover { background:#252d3e; }
  .eff .name { flex:1; text-align:center; font-size:15px; font-weight:700; color:#ffd34d; }
  .idx { color:#6b7488; font-size:11px; }
  input[type=range] { width:100%; }
  .sw { display:inline-block; width:24px; height:24px; border-radius:5px; margin:2px; cursor:pointer; border:2px solid transparent; vertical-align:middle; }
  .sw.on { border-color:#fff; }
  select, input[type=number] { background:#1c2230; color:#cdd3df; border:1px solid #2c3446; border-radius:5px; padding:4px 6px; width:100%; }
  .toggle { display:inline-flex; align-items:center; gap:6px; margin-right:14px; }
  .val { color:#7f8aa0; font-size:11px; float:right; }
  button.act { width:100%; padding:9px; margin-top:6px; background:#2a6df0; color:#fff; border:0; border-radius:7px; font-weight:700; cursor:pointer; }
  button.act:hover { background:#3a7dff; }
  pre { background:#0a0c11; border:1px solid #222936; border-radius:6px; padding:8px; font-size:11px; white-space:pre-wrap; color:#9fb0c8; max-height:160px; overflow:auto; }
  .fps { position:absolute; top:8px; left:10px; color:#7f8aa0; font:12px monospace; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="fps" id="fps"></div>
  </div>
  <div id="panel">
    <h1>Trail review</h1>
    <div class="sub">Live <code>trailEffects.js</code> renderers</div>

    <div class="row">
      <label>Effect <span class="idx" id="eidx"></span></label>
      <div class="eff">
        <button id="prev">◄</button>
        <div class="name" id="ename">—</div>
        <button id="next">►</button>
      </div>
    </div>

    <div class="row">
      <label>Player colour</label>
      <div id="swatches"></div>
      <input type="color" id="custom" style="margin-top:6px;width:100%;height:28px;background:#1c2230;border:1px solid #2c3446;border-radius:5px;">
    </div>

    <div class="row">
      <label>Path</label>
      <select id="path">
        <option value="circle">Circle</option>
        <option value="fig8">Figure-8</option>
        <option value="sine">Sine cruise</option>
        <option value="line">Straight back-and-forth</option>
        <option value="mouse">Follow mouse</option>
      </select>
    </div>

    <div class="row">
      <label>Speed <span class="val" id="vspeed"></span></label>
      <input type="range" id="speed" min="0.2" max="3" step="0.05" value="1">
    </div>
    <div class="row">
      <label>Trail fade (ms) <span class="val" id="vfade"></span></label>
      <input type="range" id="fade" min="800" max="8000" step="100" value="5000">
    </div>
    <div class="row">
      <label>Toggles</label>
      <span class="toggle"><input type="checkbox" id="glow" checked> Glow</span>
      <span class="toggle"><input type="checkbox" id="dim"> Dim (non-local)</span>
    </div>
    <div class="row">
      <label>Stress — karts <span class="val" id="vkarts"></span></label>
      <input type="range" id="karts" min="1" max="16" step="1" value="1">
    </div>

    <div class="row" id="effknobs">
      <label style="color:#ffd34d">This effect's knobs</label>
      <div id="knoblist"></div>
    </div>

    <div class="row">
      <button class="act" id="save">Save config</button>
      <button class="act" id="reset" style="background:#3a4254;margin-top:8px">Reset this effect</button>
      <pre id="out" style="display:none"></pre>
    </div>
  </div>
</div>

<!-- The REAL shipping renderers. Defines TRAIL_FX + tfxBaseAlpha (globals). -->
<script src="../../client/scripts/trailEffects.js"></script>
<script>
// ---- glow gate the renderers consult (tfxGlow -> perfGlow). Toggled by the checkbox. ----
var GLOW_ON = true;
window.perfGlow = function () { return GLOW_ON; };

// ---- display names (id -> label), order for the ◄ ► cycle ----
var ORDER = ['dashes','sparkle','comet','bubbles','aurora','guardian','survivor',
             'ribbon','bolt','hearts','smoke','confetti','snow','tracks','notes','neon','ripple','basic'];
var NAMES = { dashes:'Dashes', sparkle:'Sparkle', comet:'Comet', bubbles:'Bubbles', aurora:'Aurora',
  guardian:'Guardian', survivor:'Survivor', ribbon:'Ribbon', bolt:'Lightning', hearts:'Hearts',
  smoke:'Smoke', confetti:'Confetti', snow:'Crystals', tracks:'Tire Tracks', notes:'Music Notes',
  neon:'Neon Wall', ripple:'Ripples', basic:'Basic (default)' };
var PALETTE = ['#e8453c','#4caf50','#f5d142','#4a78e0','#e07b39','#9b5de5','#5ad0ff','#ef6fb0',
  '#2b2f3a','#ffffff','#c0392b','#3fb6c8'];

var cfg = { effect:'bubbles', color:'#5ad0ff', path:'circle', speed:1, fade:5000, glow:true, dim:false, karts:1 };

// Per-effect tunable knobs — keys/defaults MIRROR the TP('effect','KEY',default) calls baked
// into trailEffects.js. Editing a slider sets window.TFX_PARAMS[effect][key], which the live
// renderer reads via TP(). "Save config" exports these so the main session can bake them.
window.TFX_PARAMS = {};
var EFFECT_PARAMS = {
  dashes:   [['DASH',4,40,1,16],['GAP',2,40,1,12],['WIDTH',1,12,0.5,4]],
  sparkle:  [['DENSITY',4,40,1,16],['SIZE',1,12,0.5,5],['TWINKLE',0,1,0.05,0.55],['SPREAD',2,40,1,14]],
  comet:    [['WIDTH',4,40,1,16],['GLOW',0,30,1,14],['TAPER',0,1,0.05,0.80]],
  bubbles:  [['DENSITY',3,20,1,8],['SIZE',2,14,0.5,5],['RISE',4,120,2,22],['PEAK',0.1,1,0.05,0.55]],
  aurora:   [['AMP',2,40,1,14],['FREQ',2,40,1,16],['GLOW',0,40,1,16],['SOFT',1,6,1,3]],
  guardian: [['RADIUS',8,60,1,28],['PULSE',0,1,0.05,0.50],['DOTS',0,12,1,4]],
  survivor: [['DENSITY',4,30,1,14],['SIZE',2,16,0.5,7],['FLICK',0,1,0.05,0.60],['LINGER',0,1,0.05,0.55]],
  ribbon:   [['WIDTH',4,40,1,18],['TWIST',2,40,1,16]],
  bolt:     [['AMP',2,30,1,12],['GLOW',0,30,1,12],['FORKS',0,4,1,1]],
  hearts:   [['DENSITY',4,24,1,10],['SIZE',3,20,0.5,9]],
  smoke:    [['DENSITY',4,24,1,10],['SIZE',4,40,1,15]],
  confetti: [['DENSITY',4,30,1,12],['SIZE',2,20,0.5,8],['SPIN',0,200,5,50]],
  snow:     [['DENSITY',4,24,1,10],['SIZE',3,20,0.5,9],['SPIN',0,120,5,30]],
  tracks:   [['GAUGE',2,30,1,10],['TREAD',4,40,1,16]],
  notes:    [['DENSITY',4,24,1,9],['SIZE',3,20,0.5,8]],
  neon:     [['WIDTH',2,30,1,10],['GLOW',0,30,1,12]],
  ripple:   [['SPACING',2,30,1,9],['GLOW',0,30,1,8]],
  basic:    []
};

var cv = document.getElementById('c'), ctx = cv.getContext('2d');
function fit(){ cv.width = cv.clientWidth; cv.height = cv.clientHeight; }
window.addEventListener('resize', fit); fit();

// One kart = a moving point that lays down a {x,y,t} vertex buffer (same shape the game uses).
function Kart(phase){ this.verts=[]; this.phase=phase; this.lastPush=0; this.mx=0; this.my=0; }
var karts = [new Kart(0)];
function rebuildKarts(n){ karts=[]; for(var i=0;i<n;i++) karts.push(new Kart(i*Math.PI*2/n)); }

var mouse = { x:0, y:0 };
cv.addEventListener('mousemove', function(e){ var r=cv.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });

function kartPos(k, tSec){
  var W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=Math.min(W,H)*0.28;
  var a = tSec*1.1*cfg.speed + k.phase;
  if (cfg.path==='circle') return { x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R };
  if (cfg.path==='fig8')   return { x:cx+Math.cos(a)*R, y:cy+Math.sin(a*2)*R*0.55 };
  if (cfg.path==='sine')   return { x:((tSec*120*cfg.speed)%(W+200))-100, y:cy+Math.sin(a*1.6)*R*0.6 };
  if (cfg.path==='line')   return { x:cx+Math.sin(a)*R*1.4, y:cy + (k.phase-Math.PI)*30 };
  if (cfg.path==='mouse')  return { x:mouse.x||cx, y:mouse.y||cy };
  return { x:cx, y:cy };
}

var t0 = Date.now(), frames=0, fpsT=0, fpsEl=document.getElementById('fps');
function loop(){
  var now = Date.now(), tSec = (now - t0)/1000, fadeMs = cfg.fade, anim = now - t0;
  GLOW_ON = cfg.glow;
  ctx.clearRect(0,0,cv.width,cv.height);
  var fx = (window.TRAIL_FX && window.TRAIL_FX[cfg.effect]) ? window.TRAIL_FX[cfg.effect] : null;
  for (var ki=0; ki<karts.length; ki++){
    var k = karts[ki];
    var p = kartPos(k, tSec);
    // push a vertex ~every 16ms, expire past fade
    if (now - k.lastPush > 16){ k.verts.push({x:p.x, y:p.y, t:now}); k.lastPush = now; }
    while (k.verts.length && now - k.verts[0].t > fadeMs) k.verts.shift();
    if (k.verts.length >= 2 && fx){
      window.tfxBaseAlpha = cfg.dim ? 0.45 : 1;
      try { fx(ctx, k.verts, cfg.color, now, fadeMs, anim); } catch(e){}
      window.tfxBaseAlpha = 1;
    }
    // kart head (a simple coloured disc so you can see where the trail emits)
    ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, 6.2832);
    ctx.fillStyle = cfg.color; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.stroke();
  }
  frames++; if (now-fpsT>500){ fpsEl.textContent = Math.round(frames*1000/(now-fpsT))+' fps · '+cfg.karts+' kart(s)'; frames=0; fpsT=now; }
  requestAnimationFrame(loop);
}

// ---- UI ----
function renderEffectKnobs(id){
  var box=document.getElementById('knoblist'); box.innerHTML='';
  var defs=EFFECT_PARAMS[id]||[];
  if(!defs.length){ box.innerHTML='<span class="idx">No tunable knobs for this effect.</span>'; return; }
  window.TFX_PARAMS[id]=window.TFX_PARAMS[id]||{};
  defs.forEach(function(d){
    var key=d[0],min=d[1],max=d[2],step=d[3],def=d[4];
    var cur=(window.TFX_PARAMS[id][key]!=null)?window.TFX_PARAMS[id][key]:def;
    var wrap=document.createElement('div'); wrap.style.margin='8px 0';
    var lab=document.createElement('label'); lab.style.textTransform='none';
    lab.innerHTML=key+' <span class="val">'+cur+'</span>';
    var r=document.createElement('input'); r.type='range'; r.min=min; r.max=max; r.step=step; r.value=cur;
    r.oninput=function(){ var v=parseFloat(r.value); window.TFX_PARAMS[id][key]=v; lab.querySelector('.val').textContent=v; };
    wrap.appendChild(lab); wrap.appendChild(r); box.appendChild(wrap);
  });
}
function setEffect(id){ cfg.effect=id; document.getElementById('ename').textContent=NAMES[id]||id;
  document.getElementById('eidx').textContent='('+(ORDER.indexOf(id)+1)+'/'+ORDER.length+')';
  renderEffectKnobs(id); }
function cycle(d){ var i=(ORDER.indexOf(cfg.effect)+d+ORDER.length)%ORDER.length; setEffect(ORDER[i]); }
document.getElementById('prev').onclick=function(){cycle(-1)};
document.getElementById('next').onclick=function(){cycle(1)};
window.addEventListener('keydown',function(e){ if(e.key==='ArrowLeft')cycle(-1); if(e.key==='ArrowRight')cycle(1); });

var sw=document.getElementById('swatches');
PALETTE.forEach(function(col){ var d=document.createElement('span'); d.className='sw'; d.style.background=col;
  d.onclick=function(){ cfg.color=col; markSw(); }; d.dataset.col=col; sw.appendChild(d); });
function markSw(){ [].forEach.call(sw.children,function(d){ d.classList.toggle('on', d.dataset.col===cfg.color); }); }
document.getElementById('custom').oninput=function(e){ cfg.color=e.target.value; markSw(); };

document.getElementById('path').onchange=function(e){ cfg.path=e.target.value; };
function bind(id,key,fmt){ var el=document.getElementById(id), v=document.getElementById('v'+id);
  el.oninput=function(){ cfg[key]=parseFloat(el.value); if(v)v.textContent=fmt?fmt(cfg[key]):cfg[key]; if(id==='karts')rebuildKarts(cfg.karts); }; el.oninput(); }
bind('speed','speed',function(x){return x.toFixed(2)+'×';});
bind('fade','fade',function(x){return x+' ms';});
bind('karts','karts',function(x){return x;});
document.getElementById('glow').onchange=function(e){ cfg.glow=e.target.checked; };
document.getElementById('dim').onchange=function(e){ cfg.dim=e.target.checked; };

document.getElementById('save').onclick=function(){
  // Drop empty per-effect overrides so the JSON only carries what was actually changed.
  var params={}; for(var e in window.TFX_PARAMS){ if(Object.keys(window.TFX_PARAMS[e]).length) params[e]=window.TFX_PARAMS[e]; }
  var out=document.getElementById('out'); var json=JSON.stringify({ global:cfg, params:params },null,2);
  out.style.display='block'; out.textContent=json;
  try { navigator.clipboard.writeText(json); out.textContent=json+'\n\n(copied to clipboard — paste it back to bake)'; } catch(e){}
};
document.getElementById('reset').onclick=function(){ window.TFX_PARAMS[cfg.effect]={}; renderEffectKnobs(cfg.effect); };

setEffect(cfg.effect); markSw(); rebuildKarts(1); loop();
</script>
</body>
</html>
