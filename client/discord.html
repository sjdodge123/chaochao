<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, user-scalable=no">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <title>Chao Chao — Discord Activity</title>
        <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
        <!-- isEmbedded() detection (standalone, not bundled). -->
        <script src="scripts/embed.js"></script>
        <style>
            html, body { margin: 0; height: 100%; background: #0b0c14; color: #cfe3ff;
                font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
            .wrap { height: 100%; display: flex; align-items: center; justify-content: center; }
            .panel { text-align: center; padding: 24px; max-width: 520px; }
            .brand { font-size: 28px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
            .spin { width: 36px; height: 36px; margin: 18px auto; border: 3px solid #2a3350;
                border-top-color: #7aa2ff; border-radius: 50%; animation: r 0.9s linear infinite; }
            @keyframes r { to { transform: rotate(360deg); } }
            #discordStatus { font-size: 14px; line-height: 1.5; min-height: 2.5em; }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="panel">
                <div class="brand">Chao Chao</div>
                <div class="spin" aria-hidden="true"></div>
                <div id="discordStatus" role="status">Starting…</div>
            </div>
        </div>
        <!-- Browser-safe Discord config (client id only); injected server-side from
             DISCORD_CLIENT_ID, stripped when unset. The client secret is NEVER here
             (token exchange happens server-side in a later phase). -->
        <!-- DISCORD_CONFIG -->
        <!-- Discord build is a real esbuild bundle (imports the Embedded App SDK),
             so it always loads the prebuilt dist file in dev AND prod. Run
             `npm run build` before serving. Not in the BUILD: bundle rewrite block. -->
        <script src="scripts/dist/discord.bundle.min.js"></script>
    </body>
</html>
