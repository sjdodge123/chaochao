<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
        <meta name="description" content="Join a Chao Chao game in progress or by ID, or start a new one.">
        <meta name="theme-color" content="#000000">
        <!-- Apply saved theme before first paint to avoid a flash of the wrong theme -->
        <script>(function(){try{var p=localStorage.getItem('themePref')||'auto';var d=p==='dark'||(p!=='light'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
        <!-- Preconnect to third-party origins we will hit on this page. The
             `crossorigin` attribute must match the actual fetch's cors-mode or
             the browser opens a second connection. Bootstrap CSS uses crossorigin;
             gtag, Font Awesome CSS, Supabase JS, and the simple-keyboard bundle
             do not. -->
        <link rel="preconnect" href="https://www.googletagmanager.com">
        <link rel="preconnect" href="https://stackpath.bootstrapcdn.com" crossorigin>
        <link rel="preconnect" href="https://cdn.jsdelivr.net">
        <link rel="preconnect" href="https://cdnjs.cloudflare.com">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-832XFC4F84"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());

            gtag('config', 'G-832XFC4F84');

            // Fire-and-forget analytics helper, shared across pages. No-ops if gtag is
            // unavailable (e.g. blocked by an ad/tracker blocker) so it can never throw.
            function trackEvent(name, params) {
                if (typeof gtag === 'function') { gtag('event', name, params || {}); }
            }
        </script>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="css/styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/css/index.css">
        <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
        <title>Chao Chao — Join a Game</title>
        <link rel="canonical" href="https://www.chaochaogame.com/join.html">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="Chao Chao">
        <meta property="og:title" content="Chao Chao — Join a Game">
        <meta property="og:description" content="Join a Chao Chao game in progress or by ID, or start a new one — free multiplayer browser arena racing.">
        <meta property="og:url" content="https://www.chaochaogame.com/join.html">
        <meta property="og:image" content="https://www.chaochaogame.com/assets/img/og-cover.png">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Chao Chao — Join a Game">
        <meta name="twitter:description" content="Join a Chao Chao game in progress or by ID, or start a new one.">
        <meta name="twitter:image" content="https://www.chaochaogame.com/assets/img/og-cover.png">
        <!-- isEmbedded() + portal-embed chrome trimming; standalone (not bundled). -->
        <script src="scripts/embed.js"></script>
    </head>
<body>
    <nav class="d-flex align-items-center px-3">
        <div class="navbar-brand">
            <a data-gp-nav class="brand-link" href="./index.html">ChaoChao</a>
        </div>
    </nav>
    <section>
        <div class="container join-container">
            <div class="join-header">
                <h4 class="join-title">Available games</h4>
                <button id="refreshButton" type="button" data-gp-nav class="btn btn-outline-secondary btn-sm" title="Refresh game list">
                    <i class="fa fa-refresh" aria-hidden="true"></i> Refresh
                </button>
            </div>
            <div id="notFoundBanner" class="not-found-banner" hidden>
                That game has ended or isn't accepting new players. Pick another below, or start a new one.
            </div>
            <div id="joinMenu">
                <div id="gameSelection"></div>
                <div id="emptyState" class="empty-state" hidden>
                    No games right now — start a new one!
                </div>
                <div id="loadingState" class="empty-state">
                    Looking for games…
                </div>
            </div>
            <div class="join-by-id">
                <input id="joinByIdInput" type="text" inputmode="numeric" pattern="[0-9]*" data-gp-nav class="form-control" placeholder="Have a Game ID? Enter it here">
                <button id="joinByIdButton" type="button" data-gp-nav class="btn btn-outline-info">Join</button>
            </div>
            <div class="start-new">
                <a href="./play.html" data-gp-nav class="btn btn-success btn-lg btn-primary-cta">Start a new game</a>
            </div>
        </div>
    </section>
    <script src='socket.io/socket.io.js'></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/controllerIdentity.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/index.js"></script>
    <!-- Auth: browser-safe Supabase config injected server-side; stripped when disabled. -->
    <!-- SUPABASE_CONFIG -->
    <!-- deferred (non-render-blocking); auth.js standalone, runs after the CDN. -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="scripts/auth.js"></script>
    <!-- BUILD: bundle-start -->
    <script src="scripts/join.js"></script>
    <script src="scripts/osk.js"></script>
    <script src="scripts/menuGamepad.js"></script>
    <script src="scripts/controllerHeader.js"></script>
    <!-- BUILD: bundle-end -->
</body>
</html>
