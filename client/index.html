<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Free multiplayer browser arena racing. Play with friends, survive brutal rounds, and build your own maps. No signup — works on phone, controller, or keyboard.">
    <meta name="theme-color" content="#000000">
    <link rel="canonical" href="https://www.chaochaogame.com/">
    <!-- Open Graph + Twitter Card for social / portal link previews. Scrapers
         require ABSOLUTE urls; og:image is a 1200x630 PNG (assets/img/og-cover.png).
         If the production host ever changes, update the domain here, in the other
         pages' canonical/og:url, and in robots.txt / sitemap.xml. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Chao Chao">
    <meta property="og:title" content="Chao Chao — Free Multiplayer Browser Arena Racing">
    <meta property="og:description" content="Free multiplayer browser arena racing. Play with friends, survive brutal rounds, and build your own maps. No signup needed.">
    <meta property="og:url" content="https://www.chaochaogame.com/">
    <meta property="og:image" content="https://www.chaochaogame.com/assets/img/og-cover.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chao Chao — Free Multiplayer Browser Arena Racing">
    <meta name="twitter:description" content="Free multiplayer browser arena racing. Play with friends, survive brutal rounds, and build your own maps. No signup needed.">
    <meta name="twitter:image" content="https://www.chaochaogame.com/assets/img/og-cover.png">
    <!-- Apply saved theme before first paint to avoid a flash of the wrong theme -->
    <script>(function(){try{var p=localStorage.getItem('themePref')||'auto';var d=p==='dark'||(p!=='light'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
    <!-- Preconnect to third-party origins we will hit on this page. `crossorigin`
         must MATCH the cors-mode the resource is actually fetched with, or the
         browser opens a separate connection and the handshake we paid for is
         wasted. Bootstrap CSS is loaded `crossorigin="anonymous"`; gtag.js and
         the Supabase script are not. -->
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://stackpath.bootstrapcdn.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-832XFC4F84"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());

      gtag('config', 'G-832XFC4F84');

      // Fire-and-forget analytics helper, shared across pages. No-ops if gtag is
      // unavailable (e.g. blocked by an ad/tracker blocker) so it can never throw.
      function trackEvent(name, params) {
        if (typeof gtag === 'function') { gtag('event', name, params || {}); }
      }
    </script>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <title>Chao Chao — Free Multiplayer Browser Arena Racing</title>
    <!-- isEmbedded() + portal-embed chrome trimming; standalone (not bundled) so
         it runs before first paint on every page. See scripts/embed.js. -->
    <script src="scripts/embed.js"></script>
    <!-- Structured data: schema.org VideoGame, for the Google "Game" rich result
         and richer organic-search appearance. Validate at
         https://search.google.com/test/rich-results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Chao Chao",
      "description": "Free multiplayer browser arena racing. Play with friends, survive brutal rounds, race to the goal, and build your own maps. No signup — plays in your browser.",
      "url": "https://www.chaochaogame.com/",
      "image": "https://www.chaochaogame.com/assets/img/og-cover.png",
      "applicationCategory": "Game",
      "operatingSystem": "Web",
      "genre": ["Racing", "Arena", "Multiplayer"],
      "playMode": "MultiPlayer",
      "author": { "@type": "Person", "name": "sjdodge123" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body>
    <nav class="d-flex align-items-center px-3">
      <div class="navbar-brand">
        <a data-gp-nav class="brand-link" href="./index.html">ChaoChao</a>
      </div>
    </nav>
    <section>
      <div id="main">
        <div class="container d-flex h-100 align-items-center">
          <div class="row justify-content-center align-self-center mx-auto w-100">
            <div class="landing-stack">
              <span id="game-title">Chao Chao</span>
              <p class="tagline">Slow-paced multiplayer arena racing.</p>
              <div class="play-container">
                <span id="version"><b><!-- VERSION --></b></span>
                <a href="./play.html" id="playButton" data-gp-nav class="btn btn-success btn-lg btn-primary-cta w-100" onclick="trackEvent('cta_click', { target: 'play' })">Play</a>
                <a href="./join.html" id="joinButton" data-gp-nav class="btn btn-outline-info w-100 mt-2" onclick="trackEvent('cta_click', { target: 'join' })">Join</a>
                <a href="./create.html" id="createButton" data-gp-nav class="btn btn-outline-warning w-100 mt-2" onclick="trackEvent('cta_click', { target: 'create' })">Create</a>
                <a href="./learn.html" id="learnButton" data-gp-nav class="btn btn-outline-primary w-100 mt-2" onclick="trackEvent('cta_click', { target: 'learn' })">Learn</a>
                <!-- Honeypot: invisible decoy CTA. A human never sees or tabs to it (off-screen,
                     aria-hidden, removed from tab order, NOT a data-gp-nav control); a DOM-scraping
                     bot that auto-clicks "play-like" anchors trips it and is recorded as bot_trap. -->
                <a href="#" id="freeRewardButton" tabindex="-1" aria-hidden="true"
                   style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;"
                   onclick="trackEvent('bot_trap', { trap_source: 'landing' }); return false;">Play Now — Claim Free Reward</a>
                <!-- NEWS_BANNER -->
              </div>
              <div class="tip-banner" id="tipBanner" data-gp-nav role="button" tabindex="0"
                   aria-label="Next tip" title="Click for another tip">
                <span class="tip-label" aria-hidden="true">Tip:</span>
                <span class="tip-text" id="tipText" aria-live="polite"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="scripts/controllerIdentity.js"></script>
    <script src="scripts/menuGamepad.js"></script>
    <script src="scripts/controllerHeader.js"></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/landingTips.js" defer></script>
    <!-- Auth: browser-safe Supabase config injected server-side; stripped when disabled. -->
    <!-- SUPABASE_CONFIG -->
    <!-- deferred (non-render-blocking); run in order before DOMContentLoaded. -->
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="scripts/auth.js"></script>
  </body>
</html>
