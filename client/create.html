  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/css/index.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <title>Chao Chao Map Edit</title>
  <style>
    /* When the editor is visible, lock the page so the canvas can't be
       scrolled out of view. The load window flips this back to auto
       because the map grid needs to scroll. */
    body.editor-open {
      overflow: hidden;
    }

    /* Overrides styles.css `#createWindow { height: 100% }`, which would
       otherwise force the editor to be a full viewport tall *below* the
       navbar and overflow the page. */
    #createWindow {
      position: fixed;
      top: var(--navbar-height);
      left: 0;
      right: 0;
      bottom: 0;
      width: auto;
      height: auto;
      margin: 0;
    }

    #mapEditor {
      position: relative;
      width: 100%;
      height: 100%;
      margin: 0;
    }

    /* Overrides styles.css `#controlPanel { height: 90%; width: 9%; ... }`
       so top/bottom take over for sizing. */
    #controlPanel {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 250px;
      height: auto;
      float: none;
      z-index: 1002;
      border-radius: 0;
      border: 0;
      border-right: thin solid #e6e6e6;
      padding: 0 1rem;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
    }

    .mapEditorTile {
      width: auto;
      margin-left: 0;
      margin-right: 4px;
      border-radius: 100px;
      padding: 4px 8px;
      float: left;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      height: auto;
      border: thin solid #e6e6e6;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      min-width: 60px;
      text-align: center !important;
    }

    #inputBar {
      height: auto;
    }

    #inputBar .editor-inputs:last-child {
      margin-bottom: 0;
    }

    .editor-inputs {
      margin: 0;
      margin-bottom: 1rem;
    }

    main {
      position: absolute;
      top: 0;
      left: 250px;
      right: 0;
      bottom: 0;
    }

    /* Overrides styles.css `#canvasWindow { width: 80%; margin: 0 5%; ... }`
       so the canvas-area uses the full width of <main> with the canvas
       flex-centered inside it. */
    #canvasWindow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: auto;
      height: auto;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The global `canvas` rule in styles.css pins canvases to top-left;
       inside the editor we want flex-centered, sized via JS. */
    #canvasWindow #createCanvas {
      position: static;
      display: block;
    }

    .palette {
      height: auto;
    }

    /* Keep the toolbar icons pinned to the top of the panel so they
       stay visible when the rest of the panel content scrolls. */
    #editorToolbar {
      position: sticky;
      top: 0;
      background: #f8f9fa;
      z-index: 1;
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
      margin: 0 -1rem 0.5rem;
      padding-left: 1rem;
      padding-right: 1rem;
      border-bottom: thin solid #e6e6e6;
    }

    /* Compact the panel so every control fits in a typical viewport
       height without needing to scroll. */
    #controlPanel .h5 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6c757d;
      margin: 0.4rem 0 0.25rem;
    }
    #controlPanel hr {
      display: none;
    }
    #controlPanel .mb-3 {
      margin-bottom: 0.4rem !important;
    }
    #controlPanel .editor-inputs {
      margin-bottom: 0.35rem !important;
      padding: 0.25rem 0.5rem;
      height: auto;
      min-height: 0;
      font-size: 0.85rem;
    }
    #controlPanel .btn-block {
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      margin-top: 0;
    }
    #controlPanel .mapEditorTile {
      font-size: 0.85rem;
      padding: 3px 7px;
      min-width: 50px;
    }

    /* Pin the Actions section to the bottom of the panel — together
       with the sticky toolbar, this guarantees the user can always
       reach Copy/Upload regardless of viewport height. */
    #actionsSection {
      position: sticky;
      bottom: 0;
      background: #f8f9fa;
      z-index: 1;
      margin: 0.4rem -1rem 0;
      padding: 0.5rem 1rem;
      border-top: thin solid #e6e6e6;
    }

    /* "AI racers" preview toggle, styled as a full-width action button so it's
       a large touch target and is reachable by the editor gamepad nav (A ->
       click), unlike a tiny DOM checkbox. Off looks like the other Actions
       buttons; on gets a brand-green fill (with a matching focus ring) so the
       state reads at a glance in both light and dark. Two IDs keep this above
       the [data-theme="dark"] #controlPanel .btn-block rule's specificity. */
    #controlPanel #enableAIButton.ai-on {
      background-color: #2f8f4e;
      border-color: #2f8f4e;
      color: #fff;
    }
    /* Recolour the whole keyboard focus ring (outline + halo) green so the
       on-state button doesn't show the global pink .btn:focus-visible outline
       around a green fill. Gamepad nav keeps the shared .gp-focus ring. */
    #controlPanel #enableAIButton.ai-on:focus-visible {
      outline-color: #2f8f4e;
      box-shadow: 0 0 0 3px rgba(47, 143, 78, 0.5);
    }

    @media screen and (max-width:768px) {
      #controlPanel {
        display: none;
      }

      main {
        left: 0;
      }
    }
  </style>
</head>

<body>
  <nav class="d-flex align-items-center px-3">
    <div class="navbar-brand">
      <a style="text-decoration: inherit;
      color: inherit;" href="./index.html">ChaoChao</a>
    </div>
  </nav>
  <!-- Game enclosed here -->
  <section>
    <div id="createWindow">
      <div id="mapEditor">
        <div id="controlPanel" class="bg-light">
          <div id="editorToolbar" class="d-flex align-items-center justify-content-between">
            <button id="loadButton" class="btn bg-light p-0" title="Back to map list"><i class="fa fa-arrow-left fa-2x" aria-hidden="true"></i></button>
            <button id="rebuildButton" class="btn bg-light p-0" title="Wipe map and start over"><i class="fa fa-trash fa-2x" aria-hidden="true"></i></button>
            <button id="deleteSelectedButton" class="btn bg-light p-0" title="Delete selected hazard" disabled><i class="fa fa-times fa-2x" aria-hidden="true"></i></button>
            <button id="rotateButton" class="btn bg-light p-0" title="Rotate selected hazard 15°"><i class="fa fa-rotate-right fa-2x" aria-hidden="true"></i></button>
            <button id="mouseButton" class="btn bg-light p-0" title="Switch to selection cursor"><i class="fa fa-mouse-pointer fa-2x" aria-hidden="true"></i></button>
          </div>
          <div id="inputBar" class="mb-3">
            <div class="h5">
              Details
            </div>
            <hr />
            <input class="editor-inputs form-control" type="text" id="author" name="author" placeholder="Author" maxlength="15"></input>
            <input class="editor-inputs form-control" type="text" id="name" name="name" placeholder="Map Name" maxlength="15"></input>
            <input class="editor-inputs form-control" type="text" id="email" name="email" placeholder="Email" maxlength="50"></input>
          </div>
          <div class="palette mb-3">
            <div class="h5">
              Tiles
            </div>
            <hr />
            <div>
              <button id="slowTileButton" style="background-color: #f6d7b0;" title="Sand" class="mapEditorTile"><span>Sand</span></button>
              <button id="normalTileButton" style="background-color: #523A28" title="Dirt" class="mapEditorTile"><span>Dirt</span></button>
              <button id="fastTileButton" style="background-color: #90ee90" title="Grass" class="mapEditorTile"><span>Grass</span></button>
              <button id="lavaTileButton" style="background-color: #cf1020" title="Lava" class="mapEditorTile"><span>Lava</span></button>
              <button id="iceTileButton" style="background-color: #A5F2F3" title="Ice" class="mapEditorTile"><span>Ice</span></button>
              <button id="abilityTileButton" style="background-color: #C8C8C8" title="Ability" class="mapEditorTile"><span>Ability</span></button>
              <button id="randomTileButton" style="background-color: #020DFE" title="Random" class="mapEditorTile"><span>Random</span></button>
              <button id="goalTileButton" style="background-color: #FFD700" title="Goal" class="mapEditorTile"><span>Goal</span></button>
            </div>
          </div>
          <div class="palette mb-3">
            <div class="h5">
              Hazards
            </div>
            <hr />
            <div>
              <button id="bumperButton" style="background-color: orange" title="Bumper" class="mapEditorTile"><span>Bumper</span></button>
              <button id="movingBumperButton" style="background-color: orange" title="Moving Bumper" class="mapEditorTile"><span>Moving Bumper</span></button>
            </div>
          </div>
          <div id="actionsSection">
            <div class="h5">
              Actions
            </div>
            <hr />
            <button id="enableAIButton" class="btn btn-block" aria-pressed="false"
              title="Fill the grid with AI racers. Off = a solo, bot-free run of your map."><i class="fa fa-square-o mr-2" aria-hidden="true"></i><span>AI racers: off</span></button>
            <button id="previewButton" class="btn btn-block">Preview / Playtest<i class="fa fa-play ml-2" aria-hidden="true"></i></button>
            <button id="previewStatus" class="btn btn-block" disabled style="display:none;"><span></span></button>
            <button id="exportButton" class="btn btn-block">Copy to Clipboard<i class="fa fa-clipboard ml-2" aria-hidden="true"></i></button>
            <button id="submitButton" class="btn btn-block">Upload to Github<i class="fa fa-cloud-upload ml-2"></i></button>
            <button id="submitStatus" class="btn btn-block" disabled ><span>Submitting..</span></button>
          </div>
        </div>
      </div>
      <main>
        <div id="canvasWindow"><canvas id="createCanvas" width="1366" height="768"></canvas></div>
      </main>
    </div>
    </div>
    <div id="loadWindow">
      <div class="map-image">
        <button id="createNew"><img id="createNewImage" src="">
          <div class="desc">Create a new map</div>
        </button>
      </div>
    </div>
  </section>

  <!-- Load bootstrap -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>

  <script src="scripts/osk.js"></script>
  <script src="scripts/editorGamepad.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/controllerHeader.js"></script>

</body>

</html>
