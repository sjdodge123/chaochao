name: PR validation

# Standards gate for pull requests into main. Three independent jobs so a red
# check tells you *what* broke at a glance:
#   validate         — deps install cleanly, every .js parses, the bundles build.
#   validate-content — every map JSON and config.json is structurally valid.
#   smoke-test       — the server boots and the game actually ticks without
#                      crashing (the part a parse/build check can't see).
# Keep this fast and dependency-light so it stays a low-friction check — the
# runtime checks reuse the server's own modules and add no new npm dependency.

on:
  pull_request:
    branches: [main]
    # Pure map submissions (only client/maps/** changed) are validated by
    # map-submission.yml instead — it runs utils.validateMap on the new map AND
    # ticks it through the real engine, so these code-oriented checks (bundle
    # build, JS syntax) add nothing. A mixed code+map PR still has non-map files,
    # so paths-ignore does NOT skip it and these checks run as normal. Safe to skip
    # because main has no required status checks (only a code-owner review gates merge).
    paths-ignore:
      - 'client/maps/**'

# Adding Playwright as a devDep would otherwise make `npm ci` download browser
# binaries on every job. Skip that globally; the Playwright jobs install the
# browser explicitly (the CLI install ignores this flag), so the existing
# dependency-light jobs stay as fast as before.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm ci` also fails if package.json and package-lock.json drift.
        run: npm ci

      - name: Syntax-check all JavaScript
        # Parse every tracked .js file; skip vendored deps and build output.
        run: |
          fail=0
          while IFS= read -r f; do
            if ! node --check "$f"; then
              echo "::error file=$f::Syntax check failed"
              fail=1
            fi
          done < <(find . \
            \( -path ./node_modules -o -path ./client/scripts/dist \) -prune -o \
            -name '*.js' -print)
          exit $fail

      - name: Build client bundles
        run: npm run build

  validate-content:
    # Catches broken game data — a malformed map JSON (the in-browser editor
    # opens PRs that add these) or a config.json missing keys the engine reads.
    # Both pass `node --check` yet break the server, so they need their own gate.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Needed because the validator reuses server/utils.js (which requires deps).
        run: npm ci

      - name: Validate maps and config
        run: node .github/scripts/validate-content.js

      - name: Classify maps (balance tier + playlist membership)
        run: node .github/scripts/classifier-test.js

      - name: Map ratings logic test (gating + weighted Bayesian)
        run: node .github/scripts/ratings-test.js

  smoke-test:
    # Boots the server and ticks the game — proves it still *runs*, not just that
    # it parses and builds. Catches runtime breakage in game.js / engine.js /
    # compressor.js / messenger.js that the other jobs cannot see.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Boot check (server starts and stays up)
        # Start the server on an ephemeral port; require it to log "listening"
        # within the timeout and not exit early. Catches module-load/boot crashes.
        run: |
          PORT=28734 node index.js > boot.log 2>&1 &
          server_pid=$!
          ok=0
          for i in $(seq 1 30); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "::error::Server exited before it finished booting:"
              cat boot.log
              exit 1
            fi
            if grep -q "listening on" boot.log; then ok=1; break; fi
            sleep 0.5
          done
          kill "$server_pid" 2>/dev/null || true
          wait "$server_pid" 2>/dev/null || true
          if [ "$ok" -ne 1 ]; then
            echo "::error::Server did not report 'listening' within the timeout:"
            cat boot.log
            exit 1
          fi
          echo "Server booted and is listening."

      - name: Edge-case unit tests (pure helpers — validation, map format, wire layout, math)
        run: node .github/scripts/unit-tests.js

      - name: Headless game-loop smoke test
        run: node .github/scripts/smoke-test.js

      - name: Headless Bunker brutal-round test (bury -> ring -> emerge -> claim/void)
        run: node .github/scripts/bunker-test.js

      - name: Headless playlist-selection test (playlist-aware rotation)
        run: node .github/scripts/playlist-selection-test.js

      - name: Headless start-edges test (single edges + opposite-edge combos)
        run: node .github/scripts/start-edges-test.js

      - name: Headless ability-tile duplication regression test
        run: node .github/scripts/ability-dupe-test.js

      - name: Headless punch-rework test (momentum, stamina, clash reflect)
        run: node .github/scripts/punch-rework-test.js

      - name: Headless ice-drift test (drift traction + Smooth Operator credit rules)
        run: node .github/scripts/ice-drift-test.js

      - name: Headless AI telegraph-reasoning test (ability targeting + timing)
        run: node .github/scripts/ai-telegraph-test.js

      - name: Headless AI telegraph-reasoning ENGINE test (live tick + recorded emits)
        run: node .github/scripts/ai-telegraph-engine-test.js

      - name: Headless progression test (XP / levels / achievement unlocks)
        run: node .github/scripts/progression-test.js

      - name: "Headless rewarded-ads test (2x XP claim: credit / anti-abuse / ad layer)"
        run: node .github/scripts/ads-rewarded-test.js

      - name: "Headless Star Power test (invulnerability gates: punch / explosion / cut / buffs / swap)"
        run: node .github/scripts/star-power-test.js

  perf-tick-budget:
    # Server-side worst-case load: a full 25-kart grid in a stacked brutal round.
    # Proves one room still ticks well within the 30 Hz interval. Zero new deps —
    # reuses the engine headlessly (seeded RNG + mock clock), like smoke-test.js.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Server tick-budget check
        run: node .github/scripts/perf-tick-budget.js

  button-lint:
    # Static, browser-free button input-compliance lint (accessible name, known
    # styling class, gamepad-reachability on the menu pages). Pure fs — no deps.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Static button lint
        run: node .github/scripts/lint-button-input.js

  input-validation-lint:
    # Static input-validation lint — every <input>/<textarea> in a client HTML
    # page must declare bounds (maxlength/pattern/max/accept per type) so the
    # next "what could a crafted payload do?" answer starts at the boundary.
    # Calibrated to pass on the current tree; a new unvalidated input fails.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Static input-validation lint
        run: node .github/scripts/lint-input-validation.js

  button-gate:
    # Runtime button gate on the LIVE DOM (incl. JS-injected controls): axe
    # interactive-control rules + >=44px touch targets + gamepad-reachability.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Runtime button gate
        run: node .github/scripts/button-gate.js

  client-perf:
    # Client render-perf REGRESSION gate (relative, non-blocking). Measures the
    # 25-kart brutal scenario's scripting ms/frame for BOTH the PR head and its
    # merge base, ON THE SAME RUNNER, back to back — then gates on the delta. A
    # regression gate, NOT an iPad-FPS predictor (headless software raster;
    # calibrate absolute mobile perf on a real iPad, see the calibration doc).
    #
    # Why measure the base here instead of restoring a cached baseline: GitHub's
    # shared runners vary wildly in available CPU, so the ABSOLUTE software-raster
    # ms/frame swings 2-3x run to run on byte-identical code. Comparing a live PR
    # measurement against a baseline cached from a DIFFERENT runner at a different
    # time turned that runner-speed noise into phantom "regressions" (a server-only
    # PR that can't touch client render would still trip the gate). Measuring both
    # halves on the same runner in the same job cancels the shared runner-speed
    # term out of the ratio, so only a real code-driven delta survives.
    #
    # Same-runner alone wasn't enough — the metric is scripting-ms/FRAME, and under
    # CPU contention the software rasterizer renders ~10x fewer frames, so the
    # per-frame denominator (and the metric) swung several-fold on identical code.
    # perf-client.js now: (1) pins the brutal scene so both halves render identical
    # FX, (2) DISCARDS any window below an fps floor (a starved window = contended
    # runner, not a regression), and (3) reports the MEDIAN of several valid windows.
    # If a half can't collect enough clean windows, perf-compare calls the run
    # INCONCLUSIVE instead of inventing a regression.
    # continue-on-error keeps it advisory while CI variance is learned.
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          path: head
      - name: Check out merge base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          # Two checkouts live in subdirs, so point npm caching at the head lockfile.
          cache-dependency-path: head/package-lock.json
      - name: Install dependencies (PR head)
        run: npm ci
        working-directory: head
      - name: Install dependencies (merge base)
        run: npm ci
        working-directory: base
      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('head/package-lock.json') }}
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: head
      # Measure base FIRST then PR head, both on this runner. Distinct ports so a
      # lingering socket from the first server can't collide with the second. Output
      # JSON to the shared workspace root so the compare step finds both files.
      - name: Measure merge base
        run: node .github/scripts/perf-client.js
        working-directory: base
        env:
          PERF_OUT_JSON: ${{ github.workspace }}/perf-baseline.json
          PERF_PORT: "28921"
      - name: Measure this PR
        run: node .github/scripts/perf-client.js
        working-directory: head
        env:
          PERF_OUT_JSON: ${{ github.workspace }}/perf-pr.json
          PERF_PORT: "28911"
      - name: Compare base vs PR
        run: node head/.github/scripts/perf-compare.js perf-baseline.json perf-pr.json
        env:
          PERF_COMMENT_OUT: perf-comment.md
          PERF_REGRESS_PCT: "20"
          PERF_MIN_VALID_REPS: "3"
      - name: Upload perf trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-trace
          path: head/perf-trace.zip
          if-no-files-found: ignore
      - name: Upsert sticky PR comment
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('perf-comment.md')) return;
            const body = fs.readFileSync('perf-comment.md', 'utf8');
            const marker = '<!-- chaochao-perf -->';
            try {
              // Paginate: the default page is 30 comments, so on a busy PR the marked
              // comment could be missed and a duplicate posted every run.
              const comments = await github.paginate(github.rest.issues.listComments, {
                ...context.repo, issue_number: context.issue.number, per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
              }
            } catch (e) {
              // Fork PRs get a read-only token — posting will 403. Don't fail the step;
              // the metrics are still in the job summary.
              core.warning('Could not post perf comment (likely a fork PR with a read-only token): ' + e.message);
            }
