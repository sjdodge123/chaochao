name: Game mechanic changes need release notes

on:
  pull_request:
    branches: [main]
    # Map JSON is already release-notes-exempt (this check only fires on
    # config.json/game.js/engine.js), so a pure map submission would pass trivially.
    # Skip it outright so map PRs don't carry an irrelevant check.
    paths-ignore:
      - 'client/maps/**'
  push:
    branches: [main]
    paths-ignore:
      - 'client/maps/**'

jobs:
  check-release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            # For pushes, compare against the parent commit (covers single commits
            # and pushed batches via github.event.before).
            before='${{ github.event.before }}'
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="${{ github.sha }}^"
            fi
            echo "base=$before" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Look for game mechanic changes
        id: mechanics
        run: |
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          mechanic_paths='server/config.json server/game.js server/engine.js'
          changed=$(git diff --name-only "$base" "$head" -- $mechanic_paths || true)
          if [ -z "$changed" ]; then
            echo "Touched no game mechanic files. Skipping release notes check."
            echo "changed=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed game mechanic files:"
            echo "$changed"
            # Exempt non-player-facing work (CLAUDE.md: refactors, perf, UI/CSS,
            # build/CI are exempt). If EVERY commit in the range that touches a
            # mechanic file is a non-feature conventional commit
            # (refactor/perf/build/ci/docs/style/test/chore), no release note is
            # required. A single feat/fix-type touch flips it back to required, so
            # real mechanic changes still need a note. On squash-merge to main the
            # squashed commit's subject is what's judged — type it accordingly.
            exempt_regex='^(refactor|perf|build|ci|docs|style|test|chore)(\(.+\))?!?:'
            requires_notes=0
            for sha in $(git rev-list "$base".."$head"); do
              if git diff-tree --no-commit-id --name-only -r "$sha" -- $mechanic_paths | grep -q .; then
                subject=$(git log -1 --format=%s "$sha")
                if printf '%s' "$subject" | grep -qiE "$exempt_regex"; then
                  echo "exempt (non-feature): $sha $subject"
                else
                  echo "requires notes: $sha $subject"
                  requires_notes=1
                fi
              fi
            done
            if [ "$requires_notes" -eq 0 ]; then
              echo "All commits touching game-mechanic files are non-feature type; release notes not required."
              echo "changed=" >> "$GITHUB_OUTPUT"
            else
              echo "changed<<EOF" >> "$GITHUB_OUTPUT"
              echo "$changed" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Require a CHANGELOG.md entry
        if: steps.mechanics.outputs.changed != ''
        run: |
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          if ! git diff --name-only "$base" "$head" | grep -qx CHANGELOG.md; then
            echo "::error::This change touches a game mechanic file but CHANGELOG.md was not updated."
            echo "::error::Add a player-facing entry under '## Unreleased' in CHANGELOG.md."
            echo "::error::Touched: ${{ steps.mechanics.outputs.changed }}"
            exit 1
          fi
          added=$(git diff "$base" "$head" -- CHANGELOG.md | awk '/^\+[^+]/ {n++} END {print n+0}')
          if [ "$added" -lt 1 ]; then
            echo "::error::CHANGELOG.md was modified but no new content was added. Please describe the change for players."
            exit 1
          fi
          # Reject changes that only edit existing released sections — new notes
          # should land under '## Unreleased' so the next release can sweep them up.
          # Treat ADDED and CONTEXT section headers (lines starting with '+' or ' ')
          # as section boundaries, but never DELETED ones — otherwise a release-prep
          # PR that renames '## Unreleased' to '## vX.Y.Z' (the diff contains
          # '-## Unreleased') would flip into in_unrel state and false-positive the
          # next added line as a new note.
          unreleased_added=$(git diff "$base" "$head" -- CHANGELOG.md | awk '
            /^@@/ {in_unrel = 0; next}
            /^[+ ]## Unreleased/ {in_unrel = 1; next}
            /^[+ ]## [0-9]/ {in_unrel = 0; next}
            in_unrel && /^\+[^+]/ {n++}
            END {print n+0}
          ')
          if [ "$unreleased_added" -lt 1 ]; then
            echo "::error::Add the new entry under the '## Unreleased' heading in CHANGELOG.md so it ships in the next release."
            exit 1
          fi
          echo "Release notes check passed."

      # The landing-page banner shows the [headline] bullet and clamps it to
      # three lines, so a paragraph-sized headline just gets cut off. Gate new
      # [headline] bullets to the same character cap the banner enforces
      # (MAX_HEADLINE_CHARS in index.js) — the detail belongs in the ordinary
      # bullets below it, which the weekly digest shows in full. Runs on every
      # CHANGELOG edit, not just mechanic PRs.
      - name: Keep [headline] bullets banner-sized
        run: |
          export LC_ALL=C.UTF-8
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          max=180  # keep in lockstep with MAX_HEADLINE_CHARS in index.js
          fail=0
          while IFS= read -r line; do
            # Measure what players actually see on the banner: marker stripped,
            # [text](url) collapsed to text, emphasis/code markers removed.
            text=$(printf '%s' "$line" \
              | sed -E 's/^\+[[:space:]]*-[[:space:]]+\[[Hh][Ee][Aa][Dd][Ll][Ii][Nn][Ee](:[^]]*)?\][[:space:]]*//' \
              | sed -E 's/\[([^]]+)\]\([^)]*\)/\1/g' \
              | sed -E 's/[*`_]//g' \
              | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
            len=${#text}
            if [ "$len" -gt "$max" ]; then
              echo "::error::New [headline] bullet is ${len} chars; the landing banner caps headlines at ${max}. Write a one-line hook and move the detail into regular bullets."
              echo "::error::Offending bullet: ${text}"
              fail=1
            else
              echo "headline ok (${len}/${max} chars): ${text}"
            fi
          done < <(git diff "$base" "$head" -- CHANGELOG.md | grep -iE '^\+[[:space:]]*-[[:space:]]+\[headline(:[^]]*)?\]' || true)
          exit "$fail"

      # Nudge (warn-only) when a "### Heading" under ## Unreleased isn't in the
      # release-notes taxonomy. Unknown headings still render (kept verbatim,
      # sorted before Bug Fixes); this just keeps the generated notes tidy. The
      # known set lives in .github/scripts/changelog-lib.mjs.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Warn on unrecognised release-notes headings
        run: node .github/scripts/check-headings.mjs
