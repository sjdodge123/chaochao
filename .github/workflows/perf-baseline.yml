name: Perf baseline (main)

# Measures the client render-perf scenario on `main` and stores it in the GitHub
# Actions cache. The PR `client-perf` job restores this as its base to compute
# the regression delta. Runs only when code that could move perf changes.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - '.github/scripts/perf-client.js'
      - '.github/workflows/perf-baseline.yml'

# Skip the npm-ci browser auto-download; the browser is installed explicitly.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

# Avoid piling up baseline runs on rapid merges.
concurrency:
  group: perf-baseline
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Measure baseline
        run: node .github/scripts/perf-client.js
        env:
          PERF_OUT_JSON: perf-baseline.json
      - name: Save baseline to cache
        uses: actions/cache/save@v4
        with:
          path: perf-baseline.json
          key: perf-client-baseline-${{ github.sha }}
